<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TransCargo — Заказ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://api-maps.yandex.ru/2.1/?apikey=21a0a372-2599-476c-a069-77850517dfdb&lang=ru_RU"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root{
--bg:#ffffff; --text:#111; --card:#f3f3f3; --header:#ffffff; --accent:#00aaff; --border:#ddd;
}
.dark{
--bg:#1f1f1f; --text:#ffffff; --card:#2a2a2a; --header:#111; --accent:#00aaff; --border:#444;
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);transition:0.3s;}
.container{width:1200px;max-width:95%;margin:auto;}
header{background:var(--header);padding:15px 0;border-bottom:1px solid var(--border);}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.logo-block{display:flex;align-items:center;gap:15px;}
.logo-block img{height:50px;}
nav{display:flex;align-items:center;}
nav a{color:var(--text);margin-left:25px;text-decoration:none;font-weight:bold;}
.theme-toggle{cursor:pointer;margin-right:20px;font-size:20px;}
.hero{display:flex;flex-direction:column;gap:40px;padding:40px 0;}
.contact-form{background:var(--card);padding:25px;border-radius:10px;width:100%;max-width:500px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.contact-form input, .contact-form select{width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);}
.contact-form button{margin-top:15px;width:100%;padding:12px;background:var(--accent);border:none;border-radius:6px;color:white;font-weight:bold;cursor:pointer;transition:.2s;}
.contact-form button:hover{opacity:0.9;}
.map-section{padding:40px 0;}
#map{height:300px;border-radius:10px;margin-top:15px;}
.address-boxes{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;}
.address-box{flex:1;min-width:250px;}
.options{margin-top:20px;display:flex;flex-wrap:wrap;gap:20px;}
.option{background:var(--card);flex:1;min-width:180px;padding:15px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s;}
.option:hover{transform:translateY(-3px);}
.calculate{margin-top:20px;padding:14px 25px;background:var(--accent);border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.summary{margin-top:20px;padding:20px;background:var(--card);border-radius:10px;}
.fade{opacity:0;transform:translateY(40px);transition:0.8s;}
.fade.show{opacity:1;transform:none;}
</style>
</head>
<body>

<header>
<div class="container header-inner">
  <div class="logo-block">
    <img src="logo.jpg">
    <h2>TransCargo</h2>
  </div>
  <nav>
    <span class="material-icons theme-toggle" onclick="toggleTheme()">dark_mode</span>
    <a href="https://t.me/transcargo_support" target="_blank">Telegram</a>
    <a href="index.html">Главная</a>
    <a href="#">Личный кабинет</a>
  </nav>
</div>
</header>

<div class="container hero fade">
<h2>Оформить заказ</h2>

<div class="contact-form">
<h3>Данные отправителя</h3>
<input id="sender_name" placeholder="Ваше имя">
<input id="sender_phone" placeholder="+7 (___) ___-__-__">

<h3>Данные получателя</h3>
<input id="receiver_name" placeholder="Имя получателя">
<input id="receiver_phone" placeholder="+7 (___) ___-__-__">

<div class="address-boxes">
  <div class="address-box"><input id="from" placeholder="Откуда" onchange="setPoint('from')"></div>
  <div class="address-box"><input id="to" placeholder="Куда" onchange="setPoint('to')"></div>
</div>

<div id="map"></div>

<h3>Дополнительные услуги</h3>
<div class="options">
  <div class="option"><input type="checkbox" id="insurance"> <label for="insurance">Страховка (10%)</label></div>
  <div class="option"><input type="checkbox" id="secure"> <label for="secure">Надежная сделка (3%)</label></div>
  <div class="option"><input type="checkbox" id="sms"> <label for="sms">SMS уведомления (+20р)</label></div>
  <div class="option"><input type="checkbox" id="pack"> <label for="pack">Упаковка груза</label></div>
</div>

<button class="calculate" onclick="calculateOrder()">Рассчитать стоимость</button>

<div class="summary" id="summary">
<b>Стоимость:</b> 0₽
</div>

<button class="calculate" onclick="sendOrder()">Оформить заказ</button>
</div>
</div>

<footer>
© 2026 TransCargo
</footer>

<script>
// Theme
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",document.body.classList.contains("dark") ? "dark" : "light");
}
if(localStorage.getItem("theme")=="dark"){document.body.classList.add("dark");}

// Phone mask
['sender_phone','receiver_phone'].forEach(id=>{
  document.getElementById(id).addEventListener('input', function(e){
    let x = e.target.value.replace(/\D/g,'').substring(0,11);
    let formatted = '+7 ';
    if(x.length>1) formatted+='('+x.substring(1,4);
    if(x.length>=4) formatted+=') '+x.substring(4,7);
    if(x.length>=7) formatted+='-'+x.substring(7,9);
    if(x.length>=9) formatted+='-'+x.substring(9,11);
    e.target.value=formatted;
  });
});

// Map
ymaps.ready(init);
let map,fromMark,toMark,route;
function init(){
  map=new ymaps.Map("map",{center:[55.75,37.61],zoom:5});
}
function setPoint(input){
  let value=document.getElementById(input).value;
  if(!value) return;
  ymaps.geocode(value).then(function(res){
    let coords=res.geoObjects.get(0).geometry.getCoordinates();
    if(input=="from"){
      if(fromMark) map.geoObjects.remove(fromMark);
      fromMark=new ymaps.Placemark(coords);
      map.geoObjects.add(fromMark);
    }
    if(input=="to"){
      if(toMark) map.geoObjects.remove(toMark);
      toMark=new ymaps.Placemark(coords);
      map.geoObjects.add(toMark);
    }
    buildRoute();
  });
}
function buildRoute(){
  if(fromMark && toMark){
    let from=fromMark.geometry.getCoordinates();
    let to=toMark.geometry.getCoordinates();
    if(route) map.geoObjects.remove(route);
    ymaps.route([from,to]).then(function(r){route=r;map.geoObjects.add(route);});
  }
}

// Calculate order
function calculateOrder(){
  let basePrice = 500; // базовая цена
  let distance = fromMark && toMark ? ymaps.coordSystem.geo.getDistance(fromMark.geometry.getCoordinates(),toMark.geometry.getCoordinates())/1000 : 0;
  let price = basePrice + distance*10;
  if(document.getElementById('insurance').checked) price*=1.1;
  if(document.getElementById('secure').checked) price*=1.03;
  if(document.getElementById('sms').checked) price+=20;
  document.getElementById('summary').innerHTML="<b>Стоимость:</b> "+Math.round(price)+"₽";
}

// Send order
function sendOrder(){
  let sName=document.getElementById("sender_name").value;
  let sPhone=document.getElementById("sender_phone").value;
  let rName=document.getElementById("receiver_name").value;
  let rPhone=document.getElementById("receiver_phone").value;
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  if(!sName || !sPhone || !rName || !rPhone || !from || !to){
    alert("Пожалуйста, заполните все поля");
    return;
  }
  alert("Спасибо! Ваш заказ оформлен. С вами свяжется оператор.");
}

// Animation
let blocks=document.querySelectorAll(".fade");
window.addEventListener("scroll",function(){
  blocks.forEach(b=>{
    let pos=b.getBoundingClientRect().top;
    if(pos<window.innerHeight-100){b.classList.add("show");}
  });
});
</script>

</body>
</html>
