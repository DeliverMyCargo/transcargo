<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Расчет доставки</title>

<script src="https://api-maps.yandex.ru/2.1/?apikey=21a0a372-2599-476c-a069-77850517dfdb&lang=ru_RU"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#1f1f1f;
color:white;
}

.container{
width:1200px;
margin:auto;
padding:40px;
}

#map{
width:100%;
height:400px;
border-radius:10px;
}

.calc{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
}

button{
background:#00aaff;
border:none;
padding:12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
color:#00ff9c;
}

</style>

</head>

<body>

<div class="container">

<h2>Расчет доставки</h2>

<div id="map"></div>

<div class="calc">

<select id="type">

<option value="letter">Письмо</option>
<option value="parcel">Посылка</option>
<option value="cargo">Сборный груз</option>
<option value="truck">Выделенный транспорт</option>

</select>

<input id="weight" placeholder="Вес (кг)">

<input id="length" placeholder="Длина (см)">
<input id="width" placeholder="Ширина (см)">
<input id="height" placeholder="Высота (см)">

<input id="priceCargo" placeholder="Ценность посылки">

<label><input type="checkbox" id="insurance"> Страховка</label>
<label><input type="checkbox" id="safe"> Надежная сделка</label>
<label><input type="checkbox" id="sms"> SMS уведомления</label>

<button onclick="calculate()">Рассчитать</button>

</div>

<div class="result" id="result"></div>

</div>

<script>

ymaps.ready(init)

let map

function init(){

map=new ymaps.Map("map",{

center:[55.75,37.61],
zoom:5

})

}

function calculate(){

let type=document.getElementById("type").value
let weight=parseFloat(document.getElementById("weight").value)||1
let length=parseFloat(document.getElementById("length").value)||10
let width=parseFloat(document.getElementById("width").value)||10
let height=parseFloat(document.getElementById("height").value)||10

let volumeWeight=(length*width*height)/5000

let realWeight=Math.max(weight,volumeWeight)

let price=0

if(type=="letter"){

price=150+5*50

}

if(type=="parcel"){

price=300+8*50+(realWeight*20)

}

if(type=="cargo"){

price=800+12*50+(realWeight*5)

}

if(type=="truck"){

price=3000+50*50

}

let cargoValue=parseFloat(document.getElementById("priceCargo").value)||0

if(document.getElementById("insurance").checked){

price+=cargoValue*0.1

}

if(document.getElementById("safe").checked){

price+=cargoValue*0.03

}

if(document.getElementById("sms").checked){

price+=20

}

document.getElementById("result").innerHTML="Стоимость доставки: "+price.toFixed(0)+" ₽"

}

</script>

</body>
</html>
