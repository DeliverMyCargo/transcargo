<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#1c1c1c;color:#fff;}
.container{max-width:800px;margin:100px auto;padding:20px;background:#222;border-radius:8px;}
h2{color:#00aaff;}
input,button{width:100%;padding:10px;margin-bottom:10px;border-radius:5px;border:none;}
button{background:#00aaff;color:#000;font-weight:bold;cursor:pointer;}
button:hover{background:#0077cc;color:#fff;}
</style>
</head>
<body>
<div class="container">
<h2>Личный кабинет (тестовый)</h2>
<p>Тестовый пользователь: <b>покупатель / покупатель</b></p>
<input type="text" id="loginUser" placeholder="Имя пользователя">
<input type="password" id="loginPass" placeholder="Пароль">
<button onclick="login()">Войти</button>
<div id="userArea"></div>
</div>

<script>
function login(){
    let user=document.getElementById('loginUser').value;
    let pass=document.getElementById('loginPass').value;
    if(user==='покупатель' && pass==='покупатель'){
        document.getElementById('userArea').innerHTML='<h3>Добро пожаловать, Иван Иванов</h3><p>История заказов пока пустая (тестовый режим)</p>';
    } else {alert('Неверный логин/пароль');}
}
</script>
</body>
</html>
