<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Грузовые перевозки</title>

<script src="https://api-maps.yandex.ru/2.1/?apikey=21a0a372-2599-476c-a069-77850517dfdb&lang=ru_RU"></script>

<style>

:root{
--bg:white;
--text:#222;
--card:#f5f5f5;
}

.dark{
--bg:#111;
--text:#eee;
--card:#1c1c1c;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:var(--bg);
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
display:flex;
align-items:center;
}

.logo img{
height:60px;
margin-right:15px;
}

nav button{
padding:10px 18px;
margin-left:10px;
border:none;
background:#ff6a00;
color:white;
border-radius:5px;
cursor:pointer;
}

.theme{
background:#444;
}

/* hero */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:50px;
}

.contact{
background:var(--card);
padding:25px;
border-radius:10px;
width:300px;
text-align:center;
}

.contact input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

.contact button{
width:100%;
padding:12px;
background:#ff6a00;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.hero img{
width:420px;
}

/* map */

.map-block{
padding:50px;
}

#map{
width:100%;
height:420px;
margin-bottom:20px;
border-radius:10px;
}

.inputs{
display:flex;
gap:10px;
}

.inputs input{
flex:1;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.route-btn{
padding:10px 20px;
background:#ff6a00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.boxes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.box{
padding:10px 15px;
border-radius:6px;
background:var(--card);
border:1px solid #aaa;
}

/* services */

.services{
padding:60px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:var(--card);
padding:25px;
border-radius:10px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:50px;
}

/* about */

.about{
padding:60px;
background:var(--card);
}

/* animation */

.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.show{
opacity:1;
transform:none;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.jpg">
<h2>Грузовые перевозки</h2>
</div>

<nav>

<button onclick="location.href='order.html'">Заказать</button>
<button class="theme" onclick="toggleTheme()">🌙</button>

</nav>

</header>


<section class="hero">

<div class="contact">

<h3>Связаться с нами</h3>

<input id="name" placeholder="Введите имя">
<input id="phone" placeholder="+7 (___) ___ - __ - __">

<button onclick="send()">Отправить</button>

</div>

<img src="fura.jpg">

</section>


<section class="map-block fade">

<h2>Маршрут перевозки</h2>

<div id="map"></div>

<div class="inputs">

<input id="from" placeholder="Откуда">
<input id="to" placeholder="Куда">

<button class="route-btn" onclick="route()">Рассчитать</button>

</div>

<div class="boxes" id="boxes"></div>

</section>


<section class="services fade">

<h2>Наши услуги</h2>

<div class="grid">

<div class="card">
<img src="https://img.icons8.com/ios-filled/100/box.png">
<p>Отправить посылку</p>
</div>

<div class="card">
<img src="https://img.icons8.com/ios-filled/100/delivery.png">
<p>Перевезти вещи</p>
</div>

<div class="card">
<img src="https://img.icons8.com/ios-filled/100/truck.png">
<p>Выделенный транспорт</p>
</div>

<div class="card">
<img src="https://img.icons8.com/ios-filled/100/mail.png">
<p>Отправить письмо</p>
</div>

</div>

</section>


<section class="about fade">

<h2>О компании</h2>

<p>Телефон: +7 900 000 00 00</p>
<p>Email: info@cargo.ru</p>

<p>Офисы: Москва • СПБ • Казань • Екатеринбург</p>

</section>


<script>

/* theme */

function toggleTheme(){
document.body.classList.toggle("dark")
}

/* mask */

document.getElementById("phone").addEventListener("input",e=>{

let x=e.target.value.replace(/\D/g,'')

let r="+7 ("+x.substring(1,4)

if(x.length>=4) r+=") "+x.substring(4,7)
if(x.length>=7) r+=" - "+x.substring(7,9)
if(x.length>=9) r+=" - "+x.substring(9,11)

e.target.value=r

})

/* form */

function send(){

let n=name.value
let p=phone.value

if(!n||!p){
alert("Введите данные")
return
}

alert("С вами скоро свяжутся")

}

/* map */

let map
let routeLine
let points=[]

ymaps.ready(()=>{

map=new ymaps.Map("map",{
center:[55.75,37.61],
zoom:5
})

/* точки кликом */

map.events.add("click",e=>{

let coords=e.get("coords")

let placemark=new ymaps.Placemark(coords)

map.geoObjects.add(placemark)

points.push(coords)

})

})

/* маршрут */

function route(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value

if(!from||!to){
alert("Введите адрес")
return
}

if(routeLine){
map.geoObjects.remove(routeLine)
}

routeLine=new ymaps.multiRouter.MultiRoute({
referencePoints:[from,to],
params:{routingMode:"truck"}
})

map.geoObjects.add(routeLine)

boxes.innerHTML=`
<div class="box">${from}</div>
<div class="box">${to}</div>
`

}

/* animation */

let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show")
}
})
})

document.querySelectorAll(".fade").forEach(el=>obs.observe(el))

</script>

</body>
</html>
