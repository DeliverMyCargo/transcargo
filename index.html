<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TransCargo</title>
<script src="https://api-maps.yandex.ru/2.1/?apikey=21a0a372-2599-476c-a069-77850517dfdb&lang=ru_RU"></script>
<style>
body{margin:0;font-family:Arial;background:#1f1f1f;color:white;}
header{background:#111;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;}
header h1{color:#00aaff;}
nav a{color:white;margin-left:20px;text-decoration:none;}
.container{width:1200px;margin:auto;padding:20px;}
.hero{padding:40px 0;position:relative;}
#map{width:100%;height:450px;border-radius:10px;margin-bottom:20px;}
.form{display:flex;gap:10px;margin-bottom:20px;}
input{padding:12px;border-radius:6px;border:none;flex:1;}
button{background:#00aaff;border:none;padding:12px;border-radius:6px;font-weight:bold;cursor:pointer;}
button:hover{background:#0088cc;}
.telegram{position:fixed;left:20px;bottom:20px;width:60px;z-index:1000;}
.telegram img{width:60px;}
.truck{position:absolute;bottom:10px;left:-150px;width:150px;animation:drive 10s linear infinite;}
@keyframes drive{0%{left:-150px;}100%{left:1250px;}}
</style>
</head>
<body>
<header>
<h1>TransCargo</h1>
<nav>
<a href="#">Главная</a>
<a href="order.html">Заказать</a>
</nav>
</header>

<div class="container">
  <div class="hero">
    <h2>Доставка грузов по России</h2>
    <img src="https://cdn-icons-png.flaticon.com/512/2799/2799274.png" class="truck" alt="truck">
    <div id="map"></div>
    <div class="form">
      <input id="from" placeholder="Откуда">
      <input id="to" placeholder="Куда">
      <button onclick="goOrder()">Рассчитать и заказать</button>
    </div>
  </div>
</div>

<a class="telegram" href="https://t.me/YOUR_BOT" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
ymaps.ready(init);
let myMap, placemarkFrom, placemarkTo;
function init(){
    myMap = new ymaps.Map("map",{center:[55.75,37.61],zoom:5});
    myMap.events.add('click',function(e){
        let coords = e.get('coords');
        if(!placemarkFrom){
            placemarkFrom = new ymaps.Placemark(coords);
            myMap.geoObjects.add(placemarkFrom);
            document.getElementById("from").value = coords.join(',');
        } else if(!placemarkTo){
            placemarkTo = new ymaps.Placemark(coords);
            myMap.geoObjects.add(placemarkTo);
            document.getElementById("to").value = coords.join(',');
        }
    });
}
function updatePlacemark(id,input){
    let val=document.getElementById(input).value;
    ymaps.geocode(val).then(function(res){
        let coord=res.geoObjects.get(0).geometry.getCoordinates();
        if(id=='from'){if(placemarkFrom) myMap.geoObjects.remove(placemarkFrom); placemarkFrom=new ymaps.Placemark(coord); myMap.geoObjects.add(placemarkFrom);}
        else{if(placemarkTo) myMap.geoObjects.remove(placemarkTo); placemarkTo=new ymaps.Placemark(coord); myMap.geoObjects.add(placemarkTo);}
    });
}
document.getElementById("from").addEventListener("change",()=>updatePlacemark('from','from'));
document.getElementById("to").addEventListener("change",()=>updatePlacemark('to','to'));
function goOrder(){
    localStorage.setItem("from",document.getElementById("from").value);
    localStorage.setItem("to",document.getElementById("to").value);
    window.location="order.html";
}
</script>
