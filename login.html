<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TransCargo — Личный кабинет</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{ --bg:#fff; --text:#111; --card:#f3f3f3; --header:#fff; --accent:#00aaff; --border:#ddd; }
        .dark{ --bg:#1f1f1f; --text:#fff; --card:#2a2a2a; --header:#111; --accent:#00aaff; --border:#444; }
        * { box-sizing: border-box; }
        body{
            margin:0;
            font-family:Arial;
            background:var(--bg);
            color:var(--text);
            transition:0.3s;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }
        .container{
            width:1200px;
            max-width:95%;
            margin:auto;
        }
        header{
            background:var(--header);
            padding:15px 0;
            border-bottom:1px solid var(--border);
            position:sticky;
            top:0;
            z-index:100;
        }
        .header-inner{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }
        .logo-block{
            display:flex;
            align-items:center;
            gap:15px;
            cursor:pointer;
        }
        .logo-block img{
            height:50px;
        }
        nav{
            display:flex;
            align-items:center;
            gap:20px;
            flex-wrap:wrap;
        }
        nav a{
            color:var(--text);
            text-decoration:none;
            font-weight:bold;
            padding:5px 10px;
            border-radius:5px;
            transition:0.3s;
        }
        nav a:hover{
            background:var(--accent);
            color:#fff;
        }
        nav a.active{
            background:var(--accent);
            color:#fff;
        }
        .theme-toggle{
            cursor:pointer;
            margin-right:5px;
        }
        .cabinet{
            flex:1;
            padding:40px 0;
        }
        .auth-container{
            max-width:450px;
            margin:50px auto;
            background:var(--card);
            border-radius:10px;
            padding:30px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        .auth-tabs{
            display:flex;
            gap:10px;
            margin-bottom:30px;
        }
        .auth-tab{
            flex:1;
            text-align:center;
            padding:12px;
            background:var(--bg);
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }
        .auth-tab.active{
            background:var(--accent);
            color:#fff;
        }
        .auth-form{
            display:none;
        }
        .auth-form.active{
            display:block;
        }
        .auth-form h2{
            text-align:center;
            color:var(--accent);
            margin-bottom:20px;
        }
        .auth-form input{
            width:100%;
            padding:15px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid var(--border);
            background:var(--bg);
            color:var(--text);
            font-size:16px;
        }
        .auth-btn{
            width:100%;
            padding:15px;
            background:var(--accent);
            color:#fff;
            border:none;
            border-radius:6px;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
            margin:10px 0;
        }
        .auth-error{
            color:#ff4444;
            font-size:14px;
            margin:10px 0;
            text-align:center;
        }
        .auth-success{
            color:#4CAF50;
            font-size:14px;
            margin:10px 0;
            text-align:center;
        }
        .cabinet-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            flex-wrap:wrap;
            gap:20px;
        }
        .cabinet-title h1{
            margin:0;
            color:var(--accent);
        }
        .cabinet-title p{
            margin:5px 0 0;
            opacity:0.7;
        }
        .logout-btn{
            padding:10px 20px;
            background:#ff4444;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
            display:flex;
            align-items:center;
            gap:5px;
        }
        .tabs{
            display:flex;
            gap:10px;
            margin-bottom:30px;
            flex-wrap:wrap;
            border-bottom:2px solid var(--border);
            padding-bottom:10px;
        }
        .tab{
            padding:12px 25px;
            background:var(--card);
            border-radius:8px 8px 0 0;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }
        .tab.active{
            background:var(--accent);
            color:#fff;
        }
        .tab-content{
            display:none;
        }
        .tab-content.active{
            display:block;
        }
        .profile-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:30px;
        }
        .profile-section{
            background:var(--card);
            border-radius:10px;
            padding:25px;
        }
        .profile-section h3{
            margin-top:0;
            color:var(--accent);
            display:flex;
            align-items:center;
            gap:10px;
        }
        .profile-field{
            margin-bottom:15px;
        }
        .profile-field label{
            display:block;
            font-size:12px;
            opacity:0.7;
            margin-bottom:5px;
        }
        .profile-field input{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid var(--border);
            background:var(--bg);
            color:var(--text);
            font-size:16px;
        }
        .save-btn{
            padding:12px 25px;
            background:var(--accent);
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
            width:100%;
            margin-top:10px;
        }
        .loading{
            text-align:center;
            padding:40px;
            color:var(--accent);
        }
        footer{
            background:var(--header);
            padding:25px;
            text-align:center;
            border-top:1px solid var(--border);
            margin-top:40px;
        }
        .notification-popup{
            position:fixed;
            top:20px;
            right:20px;
            background:#4CAF50;
            color:white;
            padding:15px 25px;
            border-radius:5px;
            z-index:1000;
            animation:slideIn 0.3s;
        }
        @keyframes slideIn{
            from{transform:translateX(100%); opacity:0;}
            to{transform:translateX(0); opacity:1;}
        }
        @media (max-width:768px){
            .profile-grid{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <div class="logo-block" onclick="window.location='index.html'">
            <img src="logo.jpg" onerror="this.style.display='none'">
            <h2>TransCargo</h2>
        </div>
        <nav>
            <span class="material-icons theme-toggle" onclick="window.toggleTheme()">dark_mode</span>
            <a href="index.html">Главная</a>
            <a href="order.html">Заказать</a>
            <a href="#" class="active">Личный кабинет</a>
        </nav>
    </div>
</header>

<div class="container cabinet">
    <div id="authContainer" class="auth-container">
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="window.switchAuthTab('login')">Вход</div>
            <div class="auth-tab" onclick="window.switchAuthTab('register')">Регистрация</div>
        </div>
        
        <div id="loginForm" class="auth-form active">
            <h2>Вход</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <div id="loginError" class="auth-error"></div>
            <button class="auth-btn" onclick="window.handleLogin()">Войти</button>
        </div>
        
        <div id="registerForm" class="auth-form">
            <h2>Регистрация</h2>
            <input type="text" id="registerName" placeholder="Имя">
            <input type="text" id="registerPhone" placeholder="Телефон">
            <input type="email" id="registerEmail" placeholder="Email">
            <input type="password" id="registerPassword" placeholder="Пароль">
            <div id="registerError" class="auth-error"></div>
            <div id="registerSuccess" class="auth-success"></div>
            <button class="auth-btn" id="registerBtn" onclick="window.handleRegister()">Зарегистрироваться</button>
        </div>
    </div>
    
    <div id="cabinetContainer" style="display:none;">
        <div class="cabinet-header">
            <div class="cabinet-title">
                <h1>Личный кабинет</h1>
                <p id="userGreeting"></p>
            </div>
            <button class="logout-btn" onclick="window.handleLogout()">
                <span class="material-icons">logout</span> Выйти
            </button>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="window.switchCabinetTab('profile', this)">👤 Профиль</div>
        </div>
        
        <div id="profile" class="tab-content active">
            <div class="profile-grid">
                <div class="profile-section">
                    <h3><span class="material-icons">person</span> Личные данные</h3>
                    <div class="profile-field"><label>Имя</label><input type="text" id="profileName"></div>
                    <div class="profile-field"><label>Email</label><input type="email" id="profileEmail" readonly style="background:var(--card);"></div>
                    <div class="profile-field"><label>Телефон</label><input type="tel" id="profilePhone" placeholder="+7 (___) ___-__-__"></div>
                    <button class="save-btn" onclick="window.saveProfile()">Сохранить</button>
                </div>
                <div class="profile-section">
                    <h3><span class="material-icons">security</span> Безопасность</h3>
                    <div class="profile-field"><label>Новый пароль</label><input type="password" id="newPassword" placeholder="Новый пароль"></div>
                    <div class="profile-field"><label>Подтверждение</label><input type="password" id="confirmPassword" placeholder="Подтвердите пароль"></div>
                    <button class="save-btn" onclick="window.changePassword()">Изменить пароль</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>© 2026 TransCargo</footer>

<script>
// Supabase
const supabase = supabase.createClient(
    'https://pnheueabzgwcyyisyaur.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuaGV1ZWFiemd3Y3l5aXN5YXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjY0MTUsImV4cCI6MjA4OTMwMjQxNX0.VtMdKZONRK1_6J2ZPqwWknDYd9_vDMcr1Jin06UNCv8'
);

// ======================
// ТЕМА
// ======================
window.toggleTheme = function() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    const icon = document.querySelector('.theme-toggle');
    if(icon) icon.textContent = document.body.classList.contains("dark") ? 'light_mode' : 'dark_mode';
};
if(localStorage.getItem("theme") == "dark") {
    document.body.classList.add("dark");
    document.querySelector('.theme-toggle').textContent = 'light_mode';
}

// ======================
// ПЕРЕКЛЮЧЕНИЕ
// ======================
window.switchAuthTab = function(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    if(tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
    }
};

window.switchCabinetTab = function(tabName, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tabName).classList.add('active');
};

// ======================
// ПРОВЕРКА СЕССИИ
// ======================
async function checkAuth() {
    try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            const { data: profile } = await supabase
                .from('profiles')
                .select('full_name, phone')
                .eq('id', session.user.id)
                .single();
            
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('cabinetContainer').style.display = 'block';
            document.getElementById('userGreeting').textContent = `Здравствуйте, ${profile?.full_name || 'пользователь'}!`;
            document.getElementById('profileName').value = profile?.full_name || '';
            document.getElementById('profileEmail').value = session.user.email || '';
            document.getElementById('profilePhone').value = profile?.phone || '';
        } else {
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('cabinetContainer').style.display = 'none';
        }
    } catch (e) {
        console.log('Ошибка проверки сессии:', e);
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('cabinetContainer').style.display = 'none';
    }
}

// ======================
// РЕГИСТРАЦИЯ
// ======================
window.handleRegister = async function() {
    const name = document.getElementById('registerName').value;
    const phone = document.getElementById('registerPhone').value;
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const errorDiv = document.getElementById('registerError');
    const successDiv = document.getElementById('registerSuccess');
    const btn = document.getElementById('registerBtn');
    
    errorDiv.textContent = '';
    successDiv.textContent = '';
    
    if (!name || !phone || !email || !password) {
        errorDiv.textContent = 'Заполните все поля';
        return;
    }
    
    const cleanPhone = phone.replace(/\D/g,'');
    if (cleanPhone.length !== 11) {
        errorDiv.textContent = 'Введите корректный номер телефона';
        return;
    }
    
    if (password.length < 6) {
        errorDiv.textContent = 'Пароль должен быть не менее 6 символов';
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Регистрация...';
    
    try {
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { full_name: name, phone: cleanPhone }
            }
        });
        
        if (error) throw error;
        
        // Создаём профиль
        if (data.user) {
            await supabase
                .from('profiles')
                .upsert({
                    id: data.user.id,
                    full_name: name,
                    phone: cleanPhone
                });
        }
        
        successDiv.innerHTML = `
            <div style="text-align:center; padding:15px;">
                <div style="font-size:14px; color:#4CAF50;">✅ Регистрация успешна!</div>
                <div style="margin-top:15px;">Теперь вы можете войти</div>
            </div>
        `;
        
        setTimeout(() => window.switchAuthTab('login'), 3000);
        
    } catch (error) {
        errorDiv.textContent = error.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
    }
};

// ======================
// ВХОД
// ======================
window.handleLogin = async function() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    errorDiv.textContent = '';
    
    if (!email || !password) {
        errorDiv.textContent = 'Заполните все поля';
        return;
    }
    
    try {
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });
        
        if (error) throw error;
        
        showNotification('Успешный вход!');
        checkAuth();
        
    } catch (error) {
        errorDiv.textContent = error.message;
    }
};

// ======================
// ВЫХОД
// ======================
window.handleLogout = async function() {
    await supabase.auth.signOut();
    showNotification('Вы вышли');
    checkAuth();
};

// ======================
// ПРОФИЛЬ
// ======================
window.saveProfile = async function() {
    const name = document.getElementById('profileName').value;
    const phone = document.getElementById('profilePhone').value;
    const cleanPhone = phone.replace(/\D/g,'');
    const { data: { session } } = await supabase.auth.getSession();
    
    if (session) {
        await supabase
            .from('profiles')
            .upsert({
                id: session.user.id,
                full_name: name,
                phone: cleanPhone
            });
        showNotification('Данные сохранены');
        document.getElementById('userGreeting').textContent = `Здравствуйте, ${name}!`;
    }
};

window.changePassword = async function() {
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    
    if (!newPass || !confirm) {
        showNotification('Заполните поля');
        return;
    }
    
    if (newPass !== confirm) {
        showNotification('Пароли не совпадают');
        return;
    }
    
    if (newPass.length < 6) {
        showNotification('Пароль минимум 6 символов');
        return;
    }
    
    const { error } = await supabase.auth.updateUser({ password: newPass });
    
    if (error) {
        showNotification('Ошибка: ' + error.message);
    } else {
        showNotification('Пароль изменен');
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
    }
};

// ======================
// УВЕДОМЛЕНИЯ
// ======================
function showNotification(message) {
    const notif = document.createElement('div');
    notif.className = 'notification-popup';
    notif.textContent = message;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

// ======================
// МАСКА ТЕЛЕФОНА (исправлена)
// ======================
function formatPhone(input) {
    let x = input.value.replace(/\D/g,'').substring(0,11);
    if(x.length === 0) { 
        input.value = ''; 
        return; 
    }
    if(x[0] === '8') x = '7' + x.substring(1);
    if(x[0] !== '7') x = '7' + x;
    let f = '+7';
    if(x.length > 1) f += ' (' + x.substring(1,4);
    if(x.length >= 4) f += ') ' + x.substring(4,7);
    if(x.length >= 7) f += '-' + x.substring(7,9);
    if(x.length >= 9) f += '-' + x.substring(9,11);
    input.value = f;
}

// ======================
// ИНИЦИАЛИЗАЦИЯ
// ======================
document.addEventListener('DOMContentLoaded', function() {
    // Маска для телефона в профиле
    const phoneInput = document.getElementById('profilePhone');
    if(phoneInput) {
        phoneInput.addEventListener('input', function() {
            formatPhone(this);
        });
    }
    
    // Запускаем проверку авторизации
    checkAuth();
});
</script>
</body>
</html>
