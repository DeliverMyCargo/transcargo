<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расчет стоимости</title>
<script src="https://api-maps.yandex.ru/2.1/?apikey=21a0a372-2599-476c-a069-77850517dfdb&lang=ru_RU" type="text/javascript"></script>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#1c1c1c;color:#fff;}
#map{width:70%;height:500px;float:left;margin-left:20px;margin-top:60px;}
#calc-block{width:25%;float:left;margin-left:20px;background:#222;padding:15px;border-radius:8px;margin-top:60px;}
#calc-block h3{color:#00aaff;}
#calc-block button{width:100%;padding:10px;margin-top:10px;background:#00aaff;color:#000;border:none;border-radius:5px;cursor:pointer;}
#calc-block button:hover{background:#0077cc;color:#fff;}
.result{margin-top:10px;color:#0f0;font-weight:bold;}
</style>
</head>
<body>
<h2 style="text-align:center;margin-top:60px;">Рассчитайте стоимость</h2>
<div id="map"></div>
<div id="calc-block">
<h3>Ваши данные</h3>
<label>Сервис:</label>
<select id="service">
<option value="send_letter">Отправить письмо</option>
<option value="send_package">Отправить посылку</option>
<option value="move_items">Перевезти вещи</option>
<option value="consolidated_cargo">Отправить сборным грузом</option>
<option value="dedicated_transport">Перевезти выделенным транспортом</option>
</select>
<button onclick="calculate()">Рассчитать</button>
<div class="result" id="calcResult"></div>
</div>

<script>
ymaps.ready(init);
let map, startPlacemark, endPlacemark, route;

function init(){
    map = new ymaps.Map("map", {center:[55.751244,37.618423], zoom:5});
    map.events.add('click', function(e){
        let coords = e.get('coords');
        if(!startPlacemark){
            startPlacemark = new ymaps.Placemark(coords,{hintContent:'Откуда', balloonContent:'Откуда'},{draggable:true});
            map.geoObjects.add(startPlacemark);
        } else if(!endPlacemark){
            endPlacemark = new ymaps.Placemark(coords,{hintContent:'Куда', balloonContent:'Куда'},{draggable:true});
            map.geoObjects.add(endPlacemark);
        }
    });
}

function calculate(){
    if(!startPlacemark || !endPlacemark){alert('Выберите точки на карте'); return;}
    let from = startPlacemark.geometry.getCoordinates();
    let to = endPlacemark.geometry.getCoordinates();
    ymaps.route([from, to]).then(function(r){
        let km = r.getLength()/1000;
        let fuel = km*30/100*80; 
        let driver = km*15; 
        let amort = km*20;
        let subtotal = fuel+driver+amort;
        let final = subtotal*1.6; 
        document.getElementById('calcResult').textContent = 'Расстояние: '+km.toFixed(1)+' км, Цена ≈ '+final.toFixed(0)+' ₽';
        route = r;
        map.geoObjects.add(route);
    });
}
</script>
</body>
</html>
